name: Eval Regression Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  regression-gate:
    runs-on: ubuntu-latest

    # Ephemeral Qdrant so the gate is hermetic: the index is rebuilt from the
    # in-repo dataset every run, isolating retrieval-quality changes to the code
    # under test rather than coupling to mutable cloud state.
    # NOTE: pin this tag to the same Qdrant version your Cloud Run/cloud Qdrant
    # serves, so CI fidelity tracks production.
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    env:
      VECTOR_STORE: qdrant
      # Loopback host → settings treats it as local and skips the API-key check,
      # so no Qdrant secret is needed in CI.
      QDRANT_URL: http://localhost:6333

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6333/readyz; then
              echo "Qdrant ready"
              exit 0
            fi
            sleep 2
          done
          echo "Qdrant did not become ready in time" >&2
          exit 1

      - name: Build index
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          SOURCE_URI: file://${{ github.workspace }}/assets
        run: uv run python src/ritam/naive_rag.py index --dataset ducks

      - name: Run eval
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: uv run python evals/run_eval.py

      - name: Check regression
        run: uv run python evals/check_regression.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: |
            evals/results.json
            evals/results.csv
