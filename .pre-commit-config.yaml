repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.6
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        additional_dependencies:
          # Packages with bundled stubs — mypy needs them installed to type-check
          # callers. Starlette, FastAPI, Pydantic all ship py.typed markers.
          - fastapi
          - pydantic
          - pydantic-settings
          - pytest
          - starlette
          - typer
          - types-requests

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        types: [python]
        pass_filenames: false

      - id: import-linter
        name: Check import architecture
        entry: uv run lint-imports
        language: system
        pass_filenames: false
        types: [python]
